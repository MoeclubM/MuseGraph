services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16-bookworm
    container_name: musegraph-postgres
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - max_connections=40
    environment:
      POSTGRES_USER: musegraph
      POSTGRES_PASSWORD: musegraph123
      POSTGRES_DB: musegraph
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musegraph"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: musegraph-redis
    command: ["redis-server", "--appendonly", "no", "--save", "", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: ..
      dockerfile: docker/server-py.Dockerfile
    container_name: musegraph-server
    environment:
      DATABASE_URL: postgresql+asyncpg://musegraph:musegraph123@postgres:5432/musegraph
      REDIS_URL: redis://redis:6379
      COGNEE_DATA_DIR: /app/.musegraph/cognee
      COGNEE_INGEST_TIMEOUT_SECONDS: ${COGNEE_INGEST_TIMEOUT_SECONDS:-300}
      COGNEE_LLM_MAX_TOKENS: ${COGNEE_LLM_MAX_TOKENS:-8192}
      TASK_STATE_SQLITE_PATH: /app/.musegraph/task_state.sqlite3
      SESSION_EXPIRES_HOURS: 168
      FILE_STORAGE_ROOT: /app/.musegraph/storage
      ENABLE_BACKEND_ACCESS_CONTROL: "false"
      APP_URL: http://localhost:3010
      TELEMETRY_DISABLED: "true"
      DISABLE_AIOHTTP_TRANSPORT: "true"
      AGENT_FLOW_TIMEOUT_SECONDS: ${AGENT_FLOW_TIMEOUT_SECONDS:-1800}
      AGENT_PI_TOOL_LOOP_MAX_ITERATIONS: ${AGENT_PI_TOOL_LOOP_MAX_ITERATIONS:-40}
      AGENT_PI_TOOL_LOOP_MAX_TOKENS: ${AGENT_PI_TOOL_LOOP_MAX_TOKENS:-16384}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED:-true}
      WEB_SEARCH_MAX_RESULTS: ${WEB_SEARCH_MAX_RESULTS:-8}
      AUTO_SEED_DATA: ${AUTO_SEED_DATA:-true}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin123!Pass}
      SEED_ADMIN_NICKNAME: ${SEED_ADMIN_NICKNAME:-Administrator}
    ports:
      - "4080:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - task_state_data:/app/.musegraph
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/web-vue.Dockerfile
    container_name: musegraph-web
    ports:
      - "3010:3000"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  task_state_data:
