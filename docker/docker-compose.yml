services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: musegraph-postgres
    environment:
      POSTGRES_USER: musegraph
      POSTGRES_PASSWORD: musegraph123
      POSTGRES_DB: musegraph
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musegraph"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: musegraph-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: docker/server-py.Dockerfile
    container_name: musegraph-server
    environment:
      DATABASE_URL: postgresql+asyncpg://musegraph:musegraph123@postgres:5432/musegraph
      COGNEE_DATABASE_URL: postgresql+asyncpg://musegraph:musegraph123@postgres:5432/musegraph_cognee
      REDIS_URL: redis://redis:6379
      TASK_STATE_SQLITE_PATH: ""
      SESSION_EXPIRES_HOURS: 168
      FILE_STORAGE_ROOT: /app/.musegraph/storage
      EMBEDDING_DIMENSIONS: "1024"
      LITELLM_DROP_PARAMS: "true"
      ENABLE_BACKEND_ACCESS_CONTROL: "false"
      APP_URL: http://localhost:3000
      TELEMETRY_DISABLED: "true"
      GRAPH_BACKEND: ${GRAPH_BACKEND:-zep}
      ZEP_API_KEY: ${ZEP_API_KEY:-}
      AUTO_SEED_DATA: ${AUTO_SEED_DATA:-true}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin123!Pass}
      SEED_ADMIN_NICKNAME: ${SEED_ADMIN_NICKNAME:-Administrator}
    ports:
      - "4080:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - task_state_data:/app/.musegraph
      - cognee_data:/usr/local/lib/python3.12/site-packages/cognee/.cognee_system
      - cognee_storage:/usr/local/lib/python3.12/site-packages/cognee/.data_storage
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/web-vue.Dockerfile
    container_name: musegraph-web
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  task_state_data:
  cognee_data:
  cognee_storage: