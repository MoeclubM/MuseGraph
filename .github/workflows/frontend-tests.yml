name: Frontend Tests

on:
  pull_request:
    paths:
      - 'apps/web-vue/**'
      - '.github/workflows/frontend-tests.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'turbo.json'
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/web-vue/**'
      - '.github/workflows/frontend-tests.yml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'turbo.json'

jobs:
  web-vue-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend unit tests with coverage
        run: pnpm --filter @musegraph/web test:coverage
